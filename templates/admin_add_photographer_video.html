<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Video for {{ photographer.first_name }} {{ photographer.last_name }} - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f0f2f5; }
        .sidebar { width: 260px; background: #2c3e50; color: white; height: 100vh; position: fixed; padding: 20px; }
        .sidebar h2 { color: #e67e22; }
        .sidebar a { display: block; color: #ecf0f1; text-decoration: none; padding: 10px; margin: 5px 0; border-radius: 8px; }
        .sidebar a:hover { background: #e67e22; }
        .main { margin-left: 260px; padding: 30px; }
        .form-card { background: white; padding: 25px; border-radius: 10px; max-width: 700px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ddd; }
        .btn { display: inline-block; padding: 8px 16px; margin: 10px 5px; background: #2ecc71; color: white; text-decoration: none; border: none; border-radius: 5px; cursor: pointer; }
        .btn-secondary { background: #95a5a6; }
        .flash { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .flash-success { background: #d4edda; color: #155724; }
        .flash-error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<div class="sidebar">
    <h2><i class="fas fa-camera"></i> SnapHire Admin</h2>
    <a href="/admin/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <a href="/admin/orders"><i class="fas fa-shopping-cart"></i> Orders</a>
    <a href="/admin/packages"><i class="fas fa-camera"></i> Packages</a>
    <a href="/admin/users"><i class="fas fa-users"></i> Users</a>
    <a href="/admin/photographers"><i class="fas fa-camera-retro"></i> Photographers</a>
    <a href="/admin/portfolio"><i class="fas fa-images"></i> Portfolio</a>
    <!-- NEW: Videos link -->
    <a href="/admin/videos"><i class="fas fa-video"></i> Videos</a>
    <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>
<div class="main">
    <h1>Add Video for {{ photographer.first_name }} {{ photographer.last_name }}</h1>
    <div class="form-card">
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Title *</label>
                <input type="text" name="title" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Duration (seconds)</label>
                <input type="number" step="0.01" name="duration_seconds">
            </div>
            <div class="form-group">
                <label>Poster Image (thumbnail)</label>
                <input type="file" name="poster_image" accept="image/*">
            </div>
            <div class="form-group">
                <label><input type="checkbox" name="is_short_loop"> Super Short Loop (autoplay, loop, muted)</label>
            </div>
            <div class="form-group">
                <label>Sort Order</label>
                <input type="number" name="sort_order" value="0">
            </div>
            <div class="form-group">
                <label>Video Files (MP4, WebM, OGG) *</label>
                <input type="file" name="video_files" multiple accept="video/mp4,video/webm,video/ogg" required>
                <small>You can upload multiple formats for the same video. The first will be default.</small>
            </div>
            <button type="submit" class="btn"><i class="fas fa-save"></i> Save Video</button>
            <a href="/admin/photographer_videos/{{ photographer.id }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
</body>
</html>
