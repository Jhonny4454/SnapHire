<!DOCTYPE html>
<html>
<head>
    <title>Packages</title>
    <style>
        html, body { margin:0; font-family:Arial; background:#f0f0f0; }
        .container { max-width:500px; margin:30px auto; background:white; padding:20px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align:center; margin-bottom:20px; }
        form div { margin:10px 0; }
        /* Buttons */
        .btn { padding:10px; margin:5px 2px; border:none; border-radius:5px; font-weight:bold; color:white; cursor:pointer; transition:0.3s; text-decoration:none; display:inline-block; width:100%; }
        .btn-select { background:#28a745; } .btn-select:hover { background:#218838; }
        .btn-summary { background:#007bff; } .btn-summary:hover { background:#0069d9; }
        .btn-back { background:#6c757d; } .btn-back:hover { background:#5a6268; }
        .btn-delete { background:#dc3545; } .btn-delete:hover { background:#c82333; }
        .btn-logout { background:#343a40; } .btn-logout:hover { background:#23272b; }

        /* Responsive layout */
        @media(min-width:500px){
            .btn { width:auto; }
            .btn-container { display:flex; flex-wrap:wrap; justify-content:center; }
        }
    </style>
</head>

<!-- With the new multi-select form -->
<form method="post">
    {% for p in packages %}
        <div>
            <input type="checkbox" name="package_ids" value="{{p.package_id}}"
                {% if p.package_id in user_packages %}checked{% endif %}>
            {{p.package_name}} - ₹{{p.price}}
        </div>
    {% endfor %}
    <button type="submit" class="btn btn-select">Update Packages</button>
</form>

        <div class="btn-container" style="margin-top:20px;">

            <a href="/edit_profile" class="btn btn-back">Back</a>
            <a href="/delete_account" class="btn btn-delete">Delete Account</a>
            <a href="/logout" class="btn btn-logout">Logout</a>
        </div>
    </div>
</body>
</html>
