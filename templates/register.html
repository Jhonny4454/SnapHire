<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        html, body { height: 100%; margin:0; display:flex; justify-content:center; align-items:center; font-family:Arial; background:#f0f0f0; }
        .container { background:white; padding:30px; border-radius:8px; text-align:center; box-shadow:0 0 10px rgba(0,0,0,0.1); width:300px; }
        input, select, button { width:100%; padding:10px; margin:8px 0; border-radius:4px; }
        button { background:#28a745; color:white; border:none; cursor:pointer; }
        button:hover { background:#218838; }
        a { display:block; margin-top:10px; color:#007bff; text-decoration:none; }
        a:hover { text-decoration:underline; }
        p.error { color:red; font-size:14px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Register</h2>

        <!-- FIX: only ONE form -->
        <form method="POST">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email" required>

            <select name="gender" required>
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>

            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Register</button>

            {% if error %}
                <p class="error">{{ error }}</p>
            {% endif %}
        </form>

        <a href="/">Back to Login</a>
    </div>
</body>
</html>
