<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Admin Login - SnapHire</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
  background-attachment: fixed;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  color: white;
  overflow-x: hidden;
  position: relative;
}

/* Animated gradient overlay */
body::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
  pointer-events: none;
}

/* Floating particles animation */
.particle {
  position: absolute;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
  pointer-events: none;
  animation: float 15s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
  50% { transform: translateY(-50px) translateX(30px); opacity: 0.5; }
}

/* HEADER - Responsive */
header {
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
  padding: clamp(12px, 4vw, 15px) clamp(20px, 5vw, 25px);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 15px;
  position: relative;
  z-index: 10;
}

.logo {
  font-size: clamp(18px, 5vw, 22px);
  font-weight: bold;
  color: #ff7f50;
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo i {
  font-size: clamp(20px, 5vw, 24px);
}

.back-home {
  text-decoration: none;
  color: white;
  background: rgba(255,255,255,0.15);
  padding: clamp(6px, 2vw, 8px) clamp(12px, 4vw, 16px);
  border-radius: 25px;
  font-size: clamp(12px, 3.5vw, 14px);
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.3s ease;
}

.back-home:hover {
  background: linear-gradient(45deg, #ff7f50, #ff6347);
  transform: translateY(-2px);
}

/* CENTER - Flex */
.center {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: clamp(20px, 5vw, 40px);
}

/* LOGIN CARD - Responsive */
.container {
  width: 100%;
  max-width: 420px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  padding: clamp(25px, 6vw, 40px) clamp(20px, 5vw, 30px);
  border-radius: 24px;
  box-shadow: 0 25px 50px rgba(0,0,0,0.3);
  text-align: center;
  color: #333;
  animation: fadeIn 0.6s ease;
  border: 1px solid rgba(255,255,255,0.2);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* TITLE - Responsive */
h2 {
  margin-bottom: clamp(20px, 5vw, 25px);
  font-size: clamp(24px, 6vw, 28px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: #333;
}

h2 i {
  color: #ff7f50;
}

/* INPUT GROUP - Responsive */
.input-group {
  position: relative;
  width: 100%;
  margin-bottom: 15px;
}

.input-group i {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: #999;
  font-size: 16px;
  z-index: 1;
}

.input-group .toggle-password {
  right: 14px;
  left: auto;
  cursor: pointer;
  z-index: 2;
}

input {
  width: 100%;
  padding: clamp(12px, 3.5vw, 14px) clamp(38px, 10vw, 42px);
  margin: 8px 0;
  border-radius: 12px;
  border: 2px solid #e0e0e0;
  outline: none;
  transition: all 0.3s ease;
  font-size: clamp(14px, 4vw, 15px);
  background: white;
}

input:focus {
  border-color: #ff7f50;
  box-shadow: 0 0 0 3px rgba(255,127,80,0.1);
}

/* BUTTON - Responsive */
button {
  width: 100%;
  margin-top: 20px;
  background: linear-gradient(135deg, #ff7f50, #ff6347);
  padding: clamp(12px, 3.5vw, 14px);
  color: white;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  font-size: clamp(14px, 4vw, 16px);
  box-shadow: 0 10px 25px rgba(255,127,80,0.4);
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 35px rgba(255,127,80,0.5);
}

button:active {
  transform: scale(0.98);
}

/* ERROR - Responsive */
.error {
  color: #e74c3c;
  margin-bottom: 15px;
  font-size: clamp(12px, 3.5vw, 14px);
  background: rgba(231,76,60,0.1);
  padding: 10px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.error i {
  font-size: 16px;
}

/* FOOTER - Responsive */
.footer {
  text-align: center;
  padding: clamp(10px, 3vw, 15px);
  color: rgba(255,255,255,0.7);
  font-size: clamp(11px, 3vw, 13px);
  position: relative;
  z-index: 10;
  background: rgba(0,0,0,0.2);
}

/* RESPONSIVE BREAKPOINTS */
@media (max-width: 480px) {
  .container {
    margin: 0 15px;
  }
  
  header {
    flex-direction: column;
    text-align: center;
  }
  
  .back-home {
    width: 100%;
    justify-content: center;
  }
  
  .logo {
    width: 100%;
    justify-content: center;
  }
}

@media (min-width: 481px) and (max-width: 768px) {
  .container {
    max-width: 380px;
  }
}

/* LANDSCAPE MODE */
@media (max-width: 768px) and (orientation: landscape) {
  .center {
    padding: 20px;
  }
  
  .container {
    padding: 25px;
  }
  
  input {
    padding: 10px 38px;
  }
}

/* PRINT STYLES */
@media print {
  body::before, .particle {
    display: none;
  }
  
  .container {
    background: white;
    box-shadow: none;
    border: 1px solid #ddd;
  }
  
  button {
    display: none;
  }
  
  .back-home {
    display: none;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <i class="fas fa-camera"></i>
    SnapHire Admin
  </div>
  <a href="/" class="back-home">
    <i class="fas fa-home"></i> Back to Home
  </a>
</header>

<div class="center">
  <div class="container">
    <h2>
      <i class="fas fa-lock"></i>
      Admin Login
    </h2>

    {% if error %}
      <div class="error">
        <i class="fas fa-exclamation-circle"></i>
        {{ error }}
      </div>
    {% endif %}

    <form method="POST">
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" name="username" placeholder="Username" required>
      </div>

      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" name="password" placeholder="Password" required>
        <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
      </div>

      <button type="submit">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>
  </div>
</div>

<div class="footer">
  <i class="fas fa-camera"></i> © 2026 SnapHire Photography Studio. All rights reserved.
</div>

<script>
function togglePassword() {
  const pwd = document.getElementById("password");
  const icon = document.querySelector(".toggle-password");
  if (pwd.type === "password") {
    pwd.type = "text";
    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");
  } else {
    pwd.type = "password";
    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");
  }
}

// Create floating particles
function createParticles() {
  for (let i = 0; i < 40; i++) {
    const particle = document.createElement('div');
    particle.classList.add('particle');
    const size = Math.random() * 6 + 2;
    particle.style.width = size + 'px';
    particle.style.height = size + 'px';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.top = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 10 + 's';
    particle.style.animationDuration = Math.random() * 15 + 8 + 's';
    document.body.appendChild(particle);
  }
}

createParticles();
</script>

</body>
</html>
