<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        html, body { height:100%; margin:0; display:flex; justify-content:center; align-items:center; background:#f0f0f0; font-family:Arial; }
        .login-box { background:white; padding:30px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); width:300px; text-align:center; }
        .login-box h2 { margin-bottom:20px; }
        .input-group { display:flex; align-items:center; margin:10px 0; border:1px solid #ccc; border-radius:5px; padding:5px 10px; }
        .input-group i { margin-right:10px; color:#007bff; }
        .input-group input { border:none; outline:none; flex:1; padding:8px; }
        button { width:100%; padding:10px; border:none; border-radius:5px; background:#007bff; color:white; cursor:pointer; margin-top:15px; }
        button:hover { background:#0056b3; }
        a { display:block; margin-top:10px; color:#007bff; text-decoration:none; }
        a:hover { text-decoration:underline; }
        p.error { color:red; font-size:14px; margin-top:10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Login</h2>
        <form method="POST">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <i class="fas fa-key"></i>
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit">Login</button>
        </form>

        <!-- Error message -->
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <a href="/register">Register</a>
    </div>
</body>
</html>
